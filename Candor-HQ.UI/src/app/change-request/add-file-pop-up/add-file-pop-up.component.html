<div class="container">
    <h1 mat-dialog-title>Add Files</h1>

        <h3>!Do you want to add Attachment?</h3>
        <div class="d-flex">
            <button mat-button (click)="showAttachFun()" class="btn-back" (click)="addFile()">Yes</button>
            <button mat-button (click)="close()" class="btn-back">No</button>
        </div>
    </div> -->
    <div>
        <div>
            <table>
                <tr>
                    <th>File</th>
                    <th>Name</th>
                    <th class="placeIcon">Add</th>
                    <th class="placeIcon">Remove</th>
                </tr>
                <tr *ngFor="let file of selectedFiles; let i=index;let first=first">
                        <td>
                            <input type="file" (change)="onFileSelected($event,i)" #fileInput style="display:none">
                            <button (click)="fileInput.click()" class="p-1">Choose File</button>
                        </td>
                        <td>
                            {{ file.name }}
                        </td>
                        <td class="placeIcon">
                            <i class="fa fa-plus" aria-hidden="true" (click)="addRow(file)"></i>
                        </td>
                        <td class="placeIcon">
                            <i class="fa fa-minus" aria-hidden="true" (click)="removeRow(i)"
                            *ngIf="!first"></i>
                        </td>
                </tr>
            </table>
        </div>
        <div class="d-flex">
            <button mat-button (click)="onNoClick()" class="btn-back" (click)="addFile()">Save</button>
            <button mat-button (click)="close()" class="btn-back">Close</button>
        </div>
    </div>
</div>
