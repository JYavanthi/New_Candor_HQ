<div class="referncetypeMainDiv">

  <div style="margin-left : 3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">
    <div class="notification-confirm" *ngIf="deleteconfirmation">
      <p style="font-size:17px;">Are you sure you want to delete this</p>
      <div style="text-align:center;">
        <button class="confirombtn" (click)="deleteyes()">Yes</button>
        <button class="confirombtn" (click)="deleteno()">No</button>
      </div>
    </div>
    <div class="notification-sucess" *ngIf="deleteinprogress">
      <p>{{deleteinmessage}}</p>
      <span class="close-btn" (click)="navigateinprogress()">Ok</span>
    </div>
    <div class="notification-sucess" *ngIf="deletesuccess">
      <p>{{deletemessage}}</p>
      <span class="close-btn" (click)="navigatesuccess()">Ok</span>
    </div>

    <div class="container-field-line">

      <div class="top-header">
        <h3 class="page-title">REFERENCE TYPE</h3>

        <div class="search-add-section">
          <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" name="search" [(ngModel)]="searchText" (input)="filterData()" autocomplete="off"
              placeholder="Search Reference Type">
          </div>

          <button class="new-btn" [routerLink]="'/newrefrencetype'">
            <i class="fa fa-plus" style="margin-top: 7%; padding-right: 5%;"></i> NEW
          </button>
        </div>
      </div>

      <!-- Table Card -->
      <div class="table-card">
        <table class="custom-table">
          <thead>
            <tr>
              <th>ReferenceType ID</th>
              <th>Reference Type</th>
              <th>Is Active</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let type of filteredData ? filteredData : Referencetype">
              <td class="id">{{ type.referenceTypeId }}</td>
              <td class="name">{{ type.referenceType }}</td>

              <td>
                <span class="status" [ngClass]="type.isActive ? 'active' : 'inactive'">
                  {{ type.isActive ? 'True' : 'False' }}
                </span>
              </td>

              <td class="action-icons">
                <a routerLink="/updaterefrencetype/{{type.referenceTypeId}}/edit">
                  <i class="fa fa-pencil edit-icon"></i>
                </a>

                <i (click)="deleteRow(type.referenceTypeId,type.referenceType)" class="fa fa-trash delete-icon">
                </i>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>



</div>
