<div class="updateSystemscopemasterMainDiv">

  <div class="sidebar">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">

    <h3 class="form-title">UPDATE SYSTEM LANDSCAPE</h3>

    <div class="form-card">

      <!-- Row 1 -->
      <div class="row">
        <div class="col">
          <label>Classification Name</label>
          <select [(ngModel)]="updatevalue[0].classificationId">
            <option value="" disabled>Select Classification</option>
            <option *ngFor="let cldata of Name" [value]="cldata.itclassificationId">
              {{cldata.classificationName}}
            </option>
          </select>
        </div>

        <div class="col">
          <label>Category Name</label>
          <select [(ngModel)]="updatevalue[0].categoryId">
            <option value="" disabled>Select Category</option>
            <option *ngFor="let cldata of categoryName" [value]="cldata.itcategoryId">
              {{cldata.categoryName}}
            </option>
          </select>
        </div>

        <div class="col">
          <label>Module Name</label>
          <select [(ngModel)]="updatevalue[0].supportId">
            <option value="">Select Module</option>
            <option *ngFor="let cldata of support" [value]="cldata.supportId">
              {{cldata.supportName}}
            </option>
          </select>
        </div>

        <div class="col">
          <label>Priority Name</label>
          <select [(ngModel)]="updatevalue[0].priorityNum">
            <option value="" disabled>Select Priority</option>
            <option *ngFor="let cldata of priName" [value]="cldata.priorityId">
              {{cldata.priorityName}}
            </option>
          </select>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="row mt-3">
        <div class="col">
          <label>System Landscape ID</label>
          <input type="text" readonly [(ngModel)]="updatevalue[0].sysLandscapeId" />
        </div>

        <div class="col">
          <label>System Landscape</label>
          <input type="text" [(ngModel)]="updatevalue[0].sysLandscape" />
        </div>

        <div class="col">
          <label>Is Active</label>
          <select [(ngModel)]="updatevalue[0].isActive">
            <option [ngValue]="true">True</option>
            <option [ngValue]="false">False</option>
          </select>
        </div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button (click)="postSystemLandscapeSp()" class="btn-submit">SUBMIT</button>
      <button [routerLink]="'/systemlandscape'" class="btn-back">BACK</button>
    </div>

  </div>
</div>
