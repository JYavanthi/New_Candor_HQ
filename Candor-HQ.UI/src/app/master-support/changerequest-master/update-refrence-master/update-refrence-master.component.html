<div class="updateReferncemastermainDiv">

  <div class="sidebar">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="main-card">
    <h3 class="title">Update Reference</h3>

    <div class="form-card">
      <div class="row">

        <div class="form-group">
          <label>Reference ID</label>
          <input type="text" [(ngModel)]="updatevalue[0].referenceId" readonly />
        </div>

        <div class="form-group">
          <label>Reference Name</label>
          <input type="text" [(ngModel)]="updatevalue[0].referenceName" />
        </div>

        <div class="form-group">
          <label>Is Active</label>
          <select [(ngModel)]="updatevalue[0].isActive">
            <option>Select</option>
            <option [ngValue]="true">True</option>
            <option [ngValue]="false">False</option>
          </select>
        </div>

      </div>
    </div>

    <div class="button-row">
      <button (click)="postRefrencePost()" class="btn-submit">SUBMIT</button>
      <button [routerLink]="'/Refrencemaster'" class="btn-back">BACK</button>
    </div>

  </div>

</div>
