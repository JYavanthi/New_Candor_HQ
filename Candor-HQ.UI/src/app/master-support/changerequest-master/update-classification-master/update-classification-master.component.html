<div class="updateClassficationmainDiv">

  <div class="sidebar">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="main-card">
    <h3 class="title">Update Classification</h3>

    <div class="form-card">
      <div class="row">

        <div class="form-group">
          <label>Classification ID</label>
          <input type="text" readonly placeholder="classificationId"
            [(ngModel)]="updatevalue[0].itclassificationId" />
        </div>

        <div class="form-group">
          <label>Classification Name</label>
          <input type="text" placeholder="Classificationname"
            [(ngModel)]="updatevalue[0].classificationName" />
        </div>

      </div>
    </div>

    <div class="button-row">
      <button (click)="postClassification()" class="btn-submit">SUBMIT</button>
      <button [routerLink]="'/classification'" class="btn-back">BACK</button>
    </div>

  </div>

</div>
