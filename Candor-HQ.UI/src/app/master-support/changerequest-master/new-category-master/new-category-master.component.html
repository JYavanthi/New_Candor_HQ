<div class="mainDiv">

  <div style="margin-left:3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">

    <h3 class="page-heading">NEW CATEGORY TYPE</h3>
    <div class="container-field-line">
      <div class="border-rfc-heading">
        <div class="row mt-2">

          <div class="col form-group">
            <label>Category Name</label>
            <select class="form-control-custom" [(ngModel)]="categoryID">
              <option value="">Select category Name</option>
              <option *ngFor="let cldata of categoryName" [value]="cldata.itcategoryId">
                {{cldata.categoryName}}
              </option>
            </select>
          </div>

          <div class="col form-group">
            <label>Category Type</label>
            <input class="form-control-custom" type="text" placeholder="Category Type" [(ngModel)]="categoryType" />
          </div>

          <div class="col form-group">
            <label>Is Active</label>
            <select class="form-control-custom" [(ngModel)]="isActive">
              <option [ngValue]="true">True</option>
              <option [ngValue]="false">False</option>
            </select>
          </div>

        </div>
      </div>
    </div>

    <div class="btn-section">
      <button (click)="postcategorytype()" [routerLink]="'/categorytypes'" class="btn submit-btn">SUBMIT</button>

      <button [routerLink]="'/categorytype'" class="btn back-btn">BACK</button>
    </div>

  </div>
</div>
