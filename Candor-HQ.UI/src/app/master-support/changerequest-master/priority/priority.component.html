<div class="prioritymainDiv">

  <div style="margin-left : 3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>


  <div class="container-implement">
    <div class="notification-confirm" *ngIf="deleteconfirmation">
      <p style="font-size:17px;">Are you sure you want to delete this</p>
      <div style="text-align:center;">
        <button class="confirombtn" (click)="deleteyes()">Yes</button>
        <button class="confirombtn" (click)="deleteno()">No</button>
      </div>
    </div>
    <div class="notification-sucess" *ngIf="deleteinprogress">
      <p>{{deleteinmessage}}</p>
      <span class="close-btn" (click)="navigateinprogress()">Ok</span>
    </div>
    <div class="notification-sucess" *ngIf="deletesuccess">
      <p>{{deletemessage}}</p>
      <span class="close-btn" (click)="navigatesuccess()">Ok</span>
    </div>
    <div class="container-field-line">
      <div class="header-row">
        <h3 class="page-title">Priority</h3>

        <div class="search-box">
          <input class="search-input" type="text" name="search" [(ngModel)]="searchText" (input)="filterData()"
            autocomplete="off" placeholder="Search Priority Name">
        </div>

        <button class="new-btn" [routerLink]="'/newpriority'">
          <i class="fa fa-plus-circle"></i> NEW
        </button>
      </div>

      <div class="table-card">
        <div class="table-wrapper">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Priority ID</th>
                <th>Priority Name</th>
                <th>Is Active</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let prior of filteredData ? filteredData : Prioritty">
                <td class="id">{{ prior.priorityId }}</td>
                <td class="name">{{ prior.priorityName }}</td>

                <td>
                  <span [ngClass]="prior.isActive ? 'active' : 'inactive'">
                    {{ prior.isActive }}
                  </span>
                </td>

                <td class="action">
                  <a routerLink="/updatepriority/{{prior.priorityId}}/edit">
                    <i class="fa fa-pencil edit"></i>
                  </a>
                  <i (click)="deleteRow(prior.priorityId,prior.priorityName)" class="fa fa-trash delete"></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
