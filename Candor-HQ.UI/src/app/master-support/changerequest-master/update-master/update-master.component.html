<div class="updateMasterMainDiv">

  <div class="sidebar">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="main-card">
    <h3 class="title">Update Category</h3>

    <div class="form-card">
      <div class="row">

        <div class="form-group">
          <label>Category ID</label>
          <input type="text" [(ngModel)]="updatevalue[0].itcategoryId" readonly />
        </div>

        <div class="form-group">
          <label>Category Name</label>
          <input type="text" placeholder="CategoryName" [(ngModel)]="updatevalue[0].categoryName" />
        </div>

        <div class="form-group">
          <label>Is Active</label>
          <select [(ngModel)]="updatevalue[0].isActive">
            <option>Select</option>
            <option [ngValue]="true">True</option>
            <option [ngValue]="false">False</option>
          </select>
        </div>

      </div>
    </div>

    <div class="button-row">
      <button (click)="postcategorytyp()" class="btn-submit">SUBMIT</button>
      <button [routerLink]="'/ChageRequest-Masters'" class="btn-back">BACK</button>
    </div>

  </div>

</div>
