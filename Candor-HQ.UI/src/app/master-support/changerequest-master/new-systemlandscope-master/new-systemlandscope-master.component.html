<div class="systemMainDiv">

  <div style="margin-left:3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">

    <!-- Heading -->
    <h3 class="page-heading">NEW SYSTEM LANDSCAPE</h3>

    <!-- Cream Card -->
    <div class="container-field-line">
      <div class="border-rfc-heading">

        <!-- Row 1 -->
        <div class="row mt-2">
          <div class="col form-group">
            <label>Module Name</label>
            <select class="form-control-custom" [(ngModel)]="supportsId">
              <option value="">Select Module Name</option>
              <option *ngFor="let cldata of support" [value]="cldata.supportId">{{cldata.supportName}}</option>
            </select>
          </div>

          <div class="col form-group">
            <label>Category Name</label>
            <select class="form-control-custom" [(ngModel)]="categoryId">
              <option value="">Select category Name</option>
              <option *ngFor="let cldata of category" [value]="cldata.itcategoryId">{{cldata.categoryName}}</option>
            </select>
          </div>

          <div class="col form-group">
            <label>Classification Name</label>
            <select class="form-control-custom" [(ngModel)]="classificationId">
              <option value="">Select classification Name</option>
              <option *ngFor="let cldata of classification" [value]="cldata.itclassificationId">
                {{cldata.classificationName}}</option>
            </select>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row mt-2">
          <div class="col form-group">
            <label>Priority Name</label>
            <select class="form-control-custom" [(ngModel)]="priorityNumber">
              <option value="">Select Priority Name</option>
              <option *ngFor="let cldata of priority" [value]="cldata.priorityId">{{cldata.priorityName}}</option>
            </select>
          </div>

          <div class="col form-group">
            <label>System Landscape</label>
            <input class="form-control-custom" type="text" placeholder="System Landscape" [(ngModel)]="sysLandscape" />
          </div>

          <div class="col form-group">
            <label>Is Active</label>
            <select class="form-control-custom" [(ngModel)]="isactive">
              <option [ngValue]="true">True</option>
              <option [ngValue]="false">False</option>
            </select>
          </div>
        </div>

      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-section">
      <button (click)="PostSystemLandscapeSp()" [routerLink]="'/systemlandscape'" class="btn submit-btn">SUBMIT</button>

      <button [routerLink]="'/systemlandscape'" class="btn back-btn">BACK</button>
    </div>

  </div>
</div>
