<div class="newOnHoldReasonMainDiv">

  <div style="margin-left: 3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">

    <!-- Heading -->
    <h3 class="page-heading">Hold Reason</h3>

    <!-- FORM CARD -->
    <div class="container-field-line" [formGroup]="myForm">
      <div class="border-rfc-heading">
        <div class="row">

          <div class="col form-group">
            <label>Module Name</label>
            <select class="form-control-custom" formControlName="supportId" (change)="onModuleChange($event.target)">
              <option value="">Select Module Name</option>
              <option *ngFor="let cldata of support;let i=index" [value]="cldata.supportId">
                {{cldata.supportName}} ({{parentArray[i]}})
              </option>
            </select>
          </div>

          <div class="col form-group" *ngIf="this.myForm.get('category')">
            <label>Category</label>
            <select class="form-control-custom" formControlName="category" (change)="getCategoryType()">
              <option value="">Select Category</option>
              <option *ngFor="let cldata of cateGoryList" [value]="cldata.itcategoryId">
                {{cldata.categoryName}}
              </option>
            </select>
          </div>

          <div class="col form-group" *ngIf="this.myForm.get('category')">
            <label>Sub-Category<span class="required">*</span></label>
            <select class="form-control-custom" formControlName="subCategory">
              <option value="" disabled selected>Select Sub-Category</option>
              <option *ngFor="let valueCtype of categoryTypeList" [value]="valueCtype.categoryTypeId">
                {{valueCtype.categoryType}}
              </option>
            </select>
          </div>

          <div class="col form-group">
            <label>Hold On Reason<span class="required">*</span></label>
            <input class="form-control-custom" formControlName="hold_reason" type="text" />
          </div>

          <div class="col form-group checkbox-group">
            <label>
              <input type="checkbox" formControlName="active" /> Active
            </label>
          </div>

        </div>

        <!-- Buttons -->
        <div class="btn-section">
          <button (click)="back()" class="btn back-btn">BACK</button>
          <button (click)="saveResaon()" class="btn submit-btn">SUBMIT</button>
        </div>

      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="table-card">
      <div class="table-wrapperm" style="overflow-x:auto">
        <table class="fl-table">
          <thead>
            <tr>
              <th>Module Name</th>
              <th>On Hold Reason</th>
              <th>Category Name</th>
              <th>Category Type Name</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let reason of reasonList">
              <td>{{reason.supportName}}</td>
              <td>{{ reason.onholdReason }}</td>
              <td>{{ reason.categoryName }}</td>
              <td>{{ reason.typeName }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
