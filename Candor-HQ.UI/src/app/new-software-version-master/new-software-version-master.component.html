<div class="newsoftwareVersionmainDiv">

    <div style="margin-left: 3%;">
        <app-support-sidebar></app-support-sidebar>
    </div>

    <div class="container-implement">

        <!-- Heading -->
        <h3 class="page-heading">Software Version</h3>

        <div class="container-field-line" [formGroup]="myForm">
            <div class="border-rfc-heading">
                <div class="row">

                    <div class="col form-group">
                        <label>Software Name</label>
                        <select class="form-control-custom" formControlName="softwareName">
                            <option value="">Select Software</option>
                            <option *ngFor="let software of softwareList" [value]="software.softwareLibraryId">
                                {{software.softwareName}}
                            </option>
                        </select>
                    </div>

                    <div class="col form-group">
                        <label>Software Version</label>
                        <input class="form-control-custom" type="text" formControlName="softwareVersion" />
                    </div>

                    <div class="col checkbox-group">
                        <label>
                            <input type="checkbox" formControlName="active" /> Active
                        </label>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="btn-section">
                    <button (click)="back()" class="btn back-btn">BACK</button>
                    <button (click)="saveSoftware()" class="btn submit-btn">SUBMIT</button>
                </div>

            </div>
        </div>

    </div>
</div>
