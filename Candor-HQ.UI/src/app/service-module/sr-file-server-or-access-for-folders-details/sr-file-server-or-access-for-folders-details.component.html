<form [formGroup]="fileAccessForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">
                    <div class="software">
                        <div class="row">
                            <div class="requestTypeClass">
                                <div>
                                    <label class="asteriskrequired">Request Type</label>
                                    <select formControlName="requestType" name="requestType"
                                        (change)="changeRequestTypeValue()">
                                        <option selected disabled hidden value="">Select Request Type</option>
                                        <option *ngFor="let requesttype of requestTypeList"
                                            [value]="requesttype.supportId">{{requesttype.supportName}}
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row"
                            *ngIf="this.fileAccessForm.value.requestType == 75 ||this.fileAccessForm.value.requestType == 76 ">
                            <div class="inputFields">
                                <div>
                                    <label for="ipAddress" class="asteriskrequired">IP Address</label>
                                    <input id="ipAddress" formControlName="ipAddress" />
                                </div>

                                <div>
                                    <label for="hostName" class="asteriskrequired">Host Name</label>
                                    <input id="hostName" formControlName="hostName" />
                                </div>

                                <div>
                                    <label for="fileServerName" class="asteriskrequired">File Server Name</label>
                                    <input id="fileServerName" formControlName="fileServerName" />
                                </div>

                                <div>
                                    <label for="folderPath" class="asteriskrequired">Folder Path</label>
                                    <input id="folderPath" formControlName="folderPath" />
                                </div>

                                <div class="textAreaDiv">
                                    <label for="purpose" class="asteriskrequired">Purpose/Justification</label>
                                    <textarea class="textAreaClass" id="purpose" formControlName="purpose"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mainBtnsDiv"
                        *ngIf="fileAccessForm.get('requestType')?.value && ((!srId)||this.srData?.status.trim() == 'Draft')">
                        <button class="actionBtn" (click)="submit('Draft')">Draft</button>
                        <button class="actionBtn" (click)="submit('Pending Approval')">Submit</button>
                        <button class="actionBtn" (click)="clearAll()">Clear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
