<form [formGroup]="virtualMeetingForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">

                    <div class="row">
                        <div class="requestTypeClass">
                            <div>
                                <label class="asteriskrequired">Request Type</label>
                                <select formControlName="requestType" name="requestType"
                                    (change)="changeRequestTypeValue()">
                                    <option selected disabled hidden value="">Select Request Type</option>
                                    <option *ngFor="let requesttype of requestTypeList" [value]="requesttype.supportId">
                                        {{requesttype.supportName}}
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row" *ngIf="virtualMeetingForm.get('requestType')?.value == 89">
                        <div class="inputFields">
                            <div>
                                <label class="asteriskrequired" for="specifyEmailID"
                                    customLabelAlert="Specify Email ID of the Employee for ID Creation">Specify Email ID
                                    of the Employee for ID Creation</label>
                                <input type="email" formControlName="specifyEmailID" name="specifyEmailID"
                                    id="specifyEmailID" />
                                <span
                                    *ngIf="virtualMeetingForm.get('specifyEmailID')?.touched && virtualMeetingForm.get('specifyEmailID')?.invalid">
                                    <span *ngIf="virtualMeetingForm.get('specifyEmailID')?.hasError('email')"
                                        style="color:red">Enter a Valid Email ID</span>
                                </span>
                            </div>


                            <div class="textAreaDiv">
                                <label class="asteriskrequired"
                                    for="purposeOrJustification">Purpose/Justification</label>
                                <textarea class="textAreaClass" formControlName="purposeOrJustification"
                                    name="purposeOrJustification"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row" *ngIf="virtualMeetingForm.get('requestType')?.value == 90">
                        <div class="inputFields">

                            <div>
                                <label class="asteriskrequired" for="specifyParticipants"
                                    customLabelAlert="Specify Number of Participants">Specify Number of
                                    Participants</label>
                                <input type="number" formControlName="specifyParticipants"
                                    name="specifyParticipants" id="specifyParticipants" />
                            </div>

                            <div>
                                <label class="asteriskrequired" for="startDate">Start Date</label>
                                <input type="date" [min]="formValidationService.todaysDate" [max]="formValidationService.maxDate"
                                formControlName="startDate" name="startDate" id="startDate" />
                            </div>

                            <div>
                                <label class="asteriskrequired" for="endDate">End Date</label>
                                <input type="date" [min]="virtualMeetingForm.value.startDate" [max]="formValidationService.maxDate"
                                formControlName="endDate" name="endDate" id="endDate" />
                            </div>

                            <div>
                                <label class="asteriskrequired" for="specifyEmailID"
                                    customLabelAlert="Specify Email ID of the Employee Who will Host the Meeting">Specify
                                    Email ID of the Employee Who will Host the Meeting</label>
                                <input type="email" formControlName="specifyEmailID" name="specifyEmailID"
                                    id="specifyEmailID" />
                                <span
                                    *ngIf="virtualMeetingForm.get('specifyEmailID')?.touched && virtualMeetingForm.get('specifyEmailID')?.invalid">
                                    <span *ngIf="virtualMeetingForm.get('specifyEmailID')?.hasError('email')"
                                        style="color:red">Enter a Valid Email ID</span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="mainBtnsDiv"
                        *ngIf="virtualMeetingForm.get('requestType')?.value && ((srId==undefined||srId==null)||this.srData?.status.trim() == 'Draft')">
                        <button class="actionBtn" (click)="Submit('Draft')">Draft</button>
                        <button class="actionBtn" (click)="Submit('Pending Approval')">Submit</button>
                        <button class="actionBtn" (click)="clearAll()">Clear</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</form>
