<form [formGroup]="antivirusForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">
                    <div class="software">
                        <div class="row">
                            <div class="requestTypeClass">
                                <div>
                                    <label class="asteriskrequired">Request Type</label>
                                    <select formControlName="requestType" name="requestType"
                                        (change)="changeRequestTypeValue()">
                                        <option selected disabled hidden value="">Select Request Type</option>
                                        <option *ngFor="let requesttype of requestTypeList"
                                            [value]="requesttype.supportId">{{requesttype.supportName}}
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row" *ngIf="antivirusForm.value.requestType == 84">
                            <div class="inputFields">
                                <div>
                                    <label class="asteriskrequired" for="installationDetails">Installation
                                        Details</label>
                                    <textarea class="textAreaClass" formControlName="installationDetails"
                                        name="installationDetails" id="installationDetails"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row" *ngIf="antivirusForm.value.requestType == 85">
                            <div class="inputFields">
                                <div>
                                    <label class="asteriskrequired" for="uninstallDetails">Uninstall Details</label>
                                    <textarea class="textAreaClass" formControlName="uninstallDetails"
                                        name="uninstallDetails" id="uninstallDetails"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row" *ngIf="antivirusForm.value.requestType == 86">
                            <div class="inputFields">
                                <div>
                                    <label class="asteriskrequired" for="excludeFolderDetails">Specify Exclude Folder
                                        Details</label>
                                    <textarea class="textAreaClass" formControlName="excludeFolderDetails"
                                        name="excludeFolderDetails" id="excludeFolderDetails"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row" *ngIf="antivirusForm.value.requestType == 87">
                            <div class="inputFields">
                                <div>
                                    <label class="asteriskrequired" for="uninstallIncludeFolders">Speciy Include
                                        Folder Details</label>
                                    <textarea class="textAreaClass" formControlName="uninstallIncludeFolders"
                                        name="uninstallIncludeFolders" id="uninstallIncludeFolders"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="mainBtnsDiv"
                            *ngIf="antivirusForm.get('requestType')?.value && ((srId==undefined||srId==null)||this.srData?.status.trim() == 'Draft')">
                            <button class="actionBtn" (click)="Submit('Draft')">Draft</button>
                            <button class="actionBtn" (click)="Submit('Pending Approval')">Submit</button>
                            <button class="actionBtn" (click)="clearAll()">Clear</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
