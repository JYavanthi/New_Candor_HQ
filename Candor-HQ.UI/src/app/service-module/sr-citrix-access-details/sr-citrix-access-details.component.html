<form [formGroup]="citrixForm">
  <div class="card service_card br-top-blue">
    <div class="card-body">
      <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
      <div class="card">
        <div class="card-body">
          <div class="software">
            <div class="row">
              <div class="requestTypeClass">
                <div>
                  <label class="asteriskrequired">Request Type</label>
                  <select formControlName="requestType" name="requestType" (change)="changeRequestTypeValue()">
                    <option selected disabled hidden value="">Select Request Type</option>
                    <option *ngFor="let requesttype of requestTypeList" value={{requesttype.supportId}}>
                      {{requesttype.supportName}}
                    </option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row" *ngIf="citrixForm.value.requestType == 63 ||citrixForm.value.requestType == 64 ">
              <div class="inputFields">
                <div>
                  <label class="asteriskrequired" for="adId">AD ID</label>
                  <input id="adId" type="text" formControlName="adId" name="adId" />
                </div>


                <div>
                  <label class="asteriskrequired" for="assetDetails">Asset details:</label>
                  <select formControlName="assetDetails" name="assetDetails" id="assetDetails" (change)="selectDetails()">
                    <option value="" disabled selected hidden>Select Asset</option>
                    <option *ngFor=" let item of assetDetails" [value]="item.assetNo">{{item?.category + ' '+ item?.assetNo}}</option>
                  </select>
                </div>
                <div>
                  <label class="asteriskrequired" for="ipAddress">IP Address:</label>
                  <input id="ipAddress" formControlName="ipAddress" name="ipAddress" />
                </div>
                <div>
                  <label class="asteriskrequired" for="hostName">Host Name:</label>
                  <input id="hostName" formControlName="hostName" name="hostName" />
                </div>
                <div>
                  <label class="asteriskrequired" for="softwareRequired">Software Required:</label>
                  <select formControlName="softwareRequired"
                  name="softwareRequired" >
                  <option selected disabled hidden value="">Select Software Name</option>
                  <option *ngFor="let item of softwareList" [value]="item.softwareLibraryId">{{item.softwareName}}</option>
              </select>
                </div>
                <div>
                  <label class="asteriskrequired" for="employeeType">Employee Type</label>
                  <select formControlName="employeeType" name="employeeType" id="employeeType">
                    <option selected hidden disabled value="">Select Employee type</option>
                    <option value="Office">Office</option>
                    <option value="Field">Field</option>
                    <option value="Consultant">Consultant</option>
                  </select>
                </div>
                <div class="asteriskrequired" *ngIf="citrixForm.value.requestType == 64">
                  <label class="asteriskrequired" for="changeOUPath">Change OU Path:</label>
                  <input id="changeOUPath" formControlName="changeOUPath" />
                </div>
                <div>
                  <label class="asteriskrequired" for="replacement"
                    customLabelAlert="AD ID of replacement user is required">In case of replacement(AD ID of replacement
                    user)</label>
                  <input id="replacement" type="text" formControlName="replacement" name="replacement" />
                </div>

                <div class="textAreaDiv" *ngIf="citrixForm.value.requestType == 63">
                  <label class="asteriskrequired" for="justification">Purpose/Justification:</label>
                  <textarea class="textAreaClass" formControlName="justification" name="justification"></textarea>
                </div>



















              </div>
            </div>
          </div>
          <div class="mainBtnsDiv"
            *ngIf="citrixForm.get('requestType')?.value && (!srId||this.srData?.status.trim() == 'Draft')">

            <button class="actionBtn" (click)="submit('Draft')">Draft</button>
            <button class="actionBtn" (click)="submit('Pending Approval')">Submit</button>
            <button class="actionBtn" (click)="clearAll()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
