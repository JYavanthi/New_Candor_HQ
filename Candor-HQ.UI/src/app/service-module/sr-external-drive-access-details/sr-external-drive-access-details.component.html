<form [formGroup]="externalDriveAccessForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">
                    <div class="software">
                        <div class="row">
                            <div class="requestTypeClass">
                                <div>
                                    <label class="asteriskrequired">Request Type</label>
                                    <select formControlName="requestType" name="requestType"
                                        (change)="changeRequestTypeValue()">
                                        <option selected disabled hidden value="">Select Request Type</option>
                                        <option *ngFor="let requesttype of requestTypeList"
                                            [value]="requesttype.supportId">{{requesttype.supportName}}
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Provide New Access Starts -->
                        <div class="row" *ngIf="externalDriveAccessForm.get('requestType')?.value == 48 ">
                            <div class="inputFields">

                                <div class="textAreaDiv">
                                  <label class="asteriskrequired" for="removeAccessRequiredFolderAccessOrPath"
                                      customLabelAlert="Enter Required Folder Access/Path">Required Folder
                                      Access/Path</label>
                                  <textarea class="textAreaClass"
                                      formControlName="removeAccessRequiredFolderAccessOrPath"
                                      name="removeAccessRequiredFolderAccessOrPath"></textarea>
                              </div>
                              <div>
                                  <label class="asteriskrequired" for="removeAccessAccessType">Access Type</label>
                                  <select formControlName="removeAccessAccessType" name="removeAccessAccessType">
                                      <option selected disabled hidden value="">Select Access Type</option>
                                      <option>Permanent</option>
                                      <option>Temporary</option>
                                  </select>
                              </div>
                              <div *ngIf="externalDriveAccessForm.get('removeAccessAccessType')?.value == 'Temporary' ">
                                <label class="asteriskrequired" for="durationAccessRequire"
                                    customLabelAlert="Enter Duration - Access Require">Duration - Access
                                    Require(Days)</label>
                                <input type="number" min="0" formControlName="durationAccessRequire"
                                    name="durationAccessRequire" />
                            </div>
                                <div style="position: relative;">
                                    <label class="asteriskrequired" for="ownerEmailOfDrive"
                                        customLabelAlert="Enter Owner Email of Drive">Owner Email of Drive(Enter Employee ID)</label>
                                    <input type="text" placeholder="Enter Employee ID or Name" formControlName="ownerEmailOfDrive" name="ownerEmailOfDrive"
                                        (input)="filterItem()" placeholder="Enter Employee ID" />
                                    <ul class="dropdowns-list" *ngIf="dropdownItems.length > 0">
                                        <li class="drop-list" value="" *ngFor="let item of dropdownItems"
                                            (click)="selectItem(item)">
                                            {{ item.employeeId + ' ' + '-' + ' ' + item.employeeName }}
                                        </li>
                                    </ul>
                                </div>
                                <div>
                                    <label class="asteriskrequired" for="ownerPlant">Owner Plant</label>
                                    <input type="text" readonly formControlName="ownerPlant" name="ownerPlant" />
                                </div>
                                <div>
                                    <label class="asteriskrequired" for="employeeType">Employee Type</label>
                                    <select formControlName="employeeType" name="employeeType">
                                        <option selected disabled hidden value="">Select Employee Type</option>
                                        <option>Office</option>
                                        <option>Field</option>
                                        <option>Consultant</option>
                                    </select>
                                </div>
                                <div class="textAreaDiv">
                                    <label class="asteriskrequired"
                                        for="justification">Purpose/Justification</label>
                                    <textarea class="textAreaClass" formControlName="justification"
                                        name="justification"></textarea>
                                </div>
                            </div>
                        </div>
                        <!--Provide New Access Ends -->

                        <!-- Remove Access Starts -->
                        <div class="row" *ngIf="externalDriveAccessForm.get('requestType')?.value == 49 ">
                            <div class="inputFields">
                                <div class="textAreaDiv">
                                    <label class="asteriskrequired" for="removeAccessRequiredFolderAccessOrPath"
                                        customLabelAlert="Enter Required Folder Access/Path">Required Folder
                                        Access/Path</label>
                                    <textarea class="textAreaClass"
                                        formControlName="removeAccessRequiredFolderAccessOrPath"
                                        name="removeAccessRequiredFolderAccessOrPath"></textarea>
                                </div>
                                <div>
                                    <label class="asteriskrequired" for="removeAccessAccessType">Remove Access Type</label>
                                    <select formControlName="removeAccessAccessType" name="removeAccessAccessType">
                                        <option selected disabled hidden value="">Select Access Type</option>
                                        <option>Permanent</option>
                                        <option>Temporary</option>
                                    </select>
                                </div>
                                <div  *ngIf="externalDriveAccessForm.get('removeAccessAccessType')?.value == 'Temporary' ">
                                    <label class="asteriskrequired" for="durationAccessRequire"
                                        customLabelAlert="Enter Duration - Access Require">Duration - Remove Access
                                        Require(Days)</label>
                                    <input type="number" min="0" formControlName="durationAccessRequire"
                                        name="durationAccessRequire" />
                                </div>
                                <div style="position: relative;">
                                    <label class="asteriskrequired" for="ownerEmailOfDrive"
                                        customLabelAlert="Enter Owner Email of Drive">Owner Email of Drive(Enter Employee ID)</label>
                                    <input type="text" formControlName="ownerEmailOfDrive" name="ownerEmailOfDrive"
                                        (input)="filterItem()" placeholder="Enter Employee ID" />
                                    <ul class="dropdowns-list" *ngIf="dropdownItems.length > 0">
                                        <li class="drop-list" value="" *ngFor="let item of dropdownItems"
                                            (click)="selectItem(item)">
                                            {{ item.employeeId + ' ' + '-' + ' ' + item.employeeName }}
                                        </li>
                                    </ul>
                                </div>
                                <div>
                                    <label class="asteriskrequired" for="ownerPlant">Owner Plant</label>
                                    <input type="text" readonly formControlName="ownerPlant" name="ownerPlant" />
                                </div>
                                <div>
                                    <label class="asteriskrequired" for="employeeType">Employee Type</label>
                                    <select formControlName="employeeType" name="employeeType">
                                        <option selected disabled hidden value="">Select Employee Type</option>
                                        <option>Office</option>
                                        <option>Field</option>
                                        <option>Consultant</option>
                                    </select>
                                </div>
                                <div class="textAreaDiv">
                                    <label class="asteriskrequired"
                                        for="justification">Purpose/Justification</label>
                                    <textarea class="textAreaClass" formControlName="justification"
                                        name="justification"></textarea>
                                </div>
                            </div>
                        </div>
                        <!-- Remove Access Starts -->

                    </div>

                    <div class="mainBtnsDiv"
                        *ngIf="externalDriveAccessForm.get('requestType')?.value && ((srId==undefined||srId==null)||this.srData?.status.trim() == 'Draft')">
                        <button class="actionBtn" (click)="Submit('Draft')">Draft</button>
                        <button class="actionBtn" (click)="Submit('Pending Approval')">Submit</button>
                        <button class="actionBtn" (click)="clearAll()">Clear</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</form>
