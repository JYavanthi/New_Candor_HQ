<form [formGroup]="vpnAccessForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="requestTypeClass">
                            <div>
                                <label class="asteriskrequired">Request Type</label>
                                <select formControlName="requestType" name="requestType"
                                    (change)="changeRequestTypeValue()">
                                    <option selected disabled hidden value="">Select Request Type</option>
                                    <option *ngFor="let requesttype of requestTypeList" [value]="requesttype.supportId">
                                        {{requesttype.supportName}}
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Provide Access & Remove Access -->
                    <div class="row"
                        *ngIf="vpnAccessForm.get('requestType')?.value == 66 || vpnAccessForm.get('requestType')?.value == 67">
                        <div class="inputFields">

                            <!-- <div>
                                <label class="asteriskrequired" for="employeeLocation">Employee Location</label>
                                <input type="text" formControlName="employeeLocation" name="employeeLocation"
                                    id="employeeLocation" />
                            </div> -->
                            

                            <div>
                                <label class="asteriskrequired" for="accessPermission">Access Permission</label>
                                <select formControlName="accessPermission" name="accessPermission"
                                    id="accessPermission">
                                    <option selected disabled hidden value="">Select Access Permission</option>
                                    <option>Temporary</option>
                                    <option>Permanent</option>
                                </select>
                            </div>

                            <div  *ngIf="vpnAccessForm.get('requestType')?.value == 66">
                                <label class="asteriskrequired" for="requiredAccessList"
                                    title="Application/File Server/System, etc">Required Access List</label>
                                <input type="text" formControlName="requiredAccessList" name="requiredAccessList"
                                    id="requiredAccessList" />
                            </div>
                            <div>
                                <label class="asteriskrequired" for="location"
                                    customLabelAlert="Which Location will use this?">Location</label>
                                <ng-multiselect-dropdown [settings]="plantDropdownSettings" [data]="plantList"
                                    formControlName="location" name="location" [disabled]="vpnAccessForm.controls['location'].disabled">
                                </ng-multiselect-dropdown>
                            </div>

                            <div  *ngIf=" vpnAccessForm.get('requestType')?.value == 67">
                              <label class="asteriskrequired" for="requiredAccessList"
                                  title="Application/File Server/System, etc">Access List to be removed</label>
                              <input type="text" formControlName="requiredAccessList" name="requiredAccessList"
                                  id="requiredAccessList" />
                          </div>

                            <div>
                                <label class="asteriskrequired" for="accessType"
                                    customLabelAlert="Select Access Type">Access Type</label>
                                <select formControlName="accessType" name="accessType" id="accessType">
                                    <option selected disabled hidden value="">Select Access Type</option>
                                    <option>WFH</option>
                                    <option>Other Office</option>
                                    <option>Consultant</option>
                                </select>
                            </div>

                            <div>
                                <label class="asteriskrequired" for="accessFromDate"
                                    customLabelAlert="Select Access From Date">Duration - Access Require: Start
                                    Date</label>
                                <input type="date" formControlName="accessFromDate" name="accessFromDate"
                                    id="accessFromDate" [min]="formValidationService.todaysDate" [max]="formValidationService.maxDate"
                                    (input)="validateYear(vpnAccessForm.value.durationFrom)"/>
                            </div>

                            <div>
                                <label class="asteriskrequired" for="accessToDate"
                                    customLabelAlert="Select Access To Date">Duration - Access Require: End Date</label>
                                <input type="date" formControlName="accessToDate" name="accessToDate"
                                    id="accessToDate"  [min]="vpnAccessForm.value.accessFromDate" [max]="formValidationService.maxDate"/>
                            </div>

                            <div>
                                <label class="asteriskrequired" for="employeeType"
                                    customLabelAlert="Select Employee Type">Employee Type</label>
                                <select formControlName="employeeType" name="employeeType" id="employeeType">
                                    <option selected disabled hidden value="">Select Employee Type</option>
                                    <option>Office</option>
                                    <option>Field</option>
                                    <option>Consultant</option>
                                </select>
                            </div>

                            <div class="textAreaDiv">
                                <label class="asteriskrequired" for="justification"
                                    customLabelAlert="Enter Purpose/Justification">Purpose/Justification</label>
                                <textarea class="textAreaClass" formControlName="justification" name="justification"
                                    id="justification"></textarea>
                            </div>

                        </div>
                    </div>
                    <div class="mainBtnsDiv"
                        *ngIf="vpnAccessForm.get('requestType')?.value && ((srId==undefined||srId==null)||this.srData?.status.trim() == 'Draft')">
                        <button class="actionBtn" (click)="Submit('Draft')">Draft</button>
                        <button class="actionBtn" (click)="Submit('Pending Approval')">Submit</button>
                        <button class="actionBtn" (click)="clearAll()">Clear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
