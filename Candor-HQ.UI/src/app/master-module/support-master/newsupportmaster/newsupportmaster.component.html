<div class="newsupportmasterMainDiv">

    <div style="margin-left: 3%;">
        <app-master-sidebar></app-master-sidebar>
    </div>

    <div class="container-implement">
        <div class="text-center pageHeadingCss"
            style="display: flex; padding-left: 33%; gap: 10px; border-bottom: 2px solid #3aa6b9; width: 98%">
            <img src="assets/image/master_log.png" alt="newMaster" class="newMasterImg">
            <p class="pageHeadingparaCss">Module Master</p>
        </div>
        <div class="container-field-line">

            <form [formGroup]="newSupportMasterForm">
                <div class="border-rfc-heading">
                    <div class="dropdownSection">
                        <div style="display:flex;align-items: center;gap:20px;">
                            <label style="color: #e57c23;">Select Parent Module</label>
                            <span style="position: relative;">
                                <input type="text" (input)="filterAllModules()" formControlName="selectParentModule"
                                    name="selectParentModule" placeholder="Enter Module Name" style="width:250px" />
                                <ul class="dropdowns-list" *ngIf="allModuleDropdownList.length > 0">
                                    <li class="drop-list" [value]="" *ngFor="let item of allModuleDropdownList"
                                        (click)="selectDropdownItem(item)">{{item.supportName? (item.supportName |
                                        titlecase) :
                                        'No match found. Try again!'}}</li>
                                </ul>
                            </span>
                        </div>
                        <div>
                            <button class="searchButton" (click)="openDialog()"><i class="fas fa-search"></i>
                                Search Module</button>
                        </div>
                    </div>
                    <br>

                    <div class="inputFieldsDiv">
                        <section>
                            <label>Module Name</label>
                            <input type="text" formControlName="moduleName" name="moduleName">
                        </section>

                        <section style="display: grid;">
                            <label>Image</label>
                            <input type="file" formControlName="myfile" name="myfile"
                                style="width: 80%; margin-left: 5%;">
                        </section>

                        <section>
                            <label>URL</label>
                            <input type="text" formControlName="url" name="url">
                        </section>

                        <section class="checkboxSection">
                            <div class="checkboxLabel">
                                <span><input type="checkbox" formControlName="reportingManagerID"
                                        name="reportingManagerID"></span>
                                <span><label>Reporting Manager</label></span>
                            </div>
                            <div class="checkboxLabel">
                                <span><input type="checkbox" formControlName="HoDID" name="HoDID"></span>
                                <span><label>HOD</label></span>
                            </div>
                        </section>

                        <section class="checkboxSection">
                            <div class="checkboxLabel">
                                <span><input type="checkbox" formControlName="active" name="active"></span>
                                <span><label>Active</label></span>
                            </div>
                            <div class="checkboxLabel">
                                <span><input type="checkbox" formControlName="visible" name="visible"></span>
                                <span><label>Visible</label></span>
                            </div>
                        </section>
                    </div>

                </div>

                <div class="btnsDiv">
                    <button type="button" [routerLink]="'/mastermodule/supportmaster'" class="actionBtn">Back</button>
                    <button type="button" class="actionBtn" (click)="submitForm()">{{MMID ? 'Update' :
                        'Submit'}}</button>
                </div>
            </form>

        </div>
    </div>

    <app-dialog *ngIf="isDialogOpen" (submitEvent)="handleSubmit($event)" (closeEvent)="handleClose()"></app-dialog>
</div>
