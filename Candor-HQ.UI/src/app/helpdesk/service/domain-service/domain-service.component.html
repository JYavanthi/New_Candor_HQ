<div class="service_container">
  <div class="card service_card" style="border-top: 6px solid #113bf7;">
    <div class="card-body">
      <div class="card">
        <div class="card-body">
          <div class="software">
            <div class="row">

                              <label>Choose Asset</label>
                              <select>
                                <option disabled selected>Choose-Asset</option>
                                <option>Server</option>

              <div style="width: 25%; margin-left: 0%;">
                <label>Request Type</label>
                <select [(ngModel)]="RequestFor" (ngModelChange)="RequestForFunc()">
                  <option selected disabled hidden value="">Select Request Type</option>
                  <option>New Domain</option>
                  <option>Renewal of Domain</option>
                  <option>New SSL Certificate</option>
                  <option>Renewal of SSL Caertificate</option>
                  <option>Discontinuation of Domain</option>
                </select>
              </div>
            </div>
            <div [hidden]="!showNewDomain">
              <div class="row">
                <div class="col">
                  <label>Required Domain Name</label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>
                <div class="col">
                  <label>Which Location<span style="color:red"> *</span></label>
                  <ng-multiselect-dropdown style="width:30%;" [settings]="dropdownDepartmentSettings"
                                           [data]="dropdownListDepartment" [(ngModel)]="selecteddepartmentNames"
                                           (ngModelChange)="onSelecteddepartmentItemsChange()">
                  </ng-multiselect-dropdown>

                </div>
                <div class="col">
                  <label>Which Departmant<span style="color:red"> *</span></label>
                  <select value="Select Departmant">
                    <option>Development</option>
                    <option>Production</option>
                    <option>Testing</option>
                  </select>
                </div>
                <div class="col">
                  <label>How many Users?<span style="color:red"> *</span></label>
                  <input type="number" style="width: 98%; margin-left: 1%;" />
                </div>
              </div>
              <div class="row">
                <div class="col">
                  <label>Domain Name<span style="color:red"> *</span></label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Due Date<span style="color:red"> *</span></label>
                  <input type="date" style="width: 98%; margin-left: 1%;" />
                </div>

              </div>
              <div class="row">
                <label>Purpose of the Domain<span style="color:red"> *</span></label>
                <textarea class="textarea-implement" style="width: 98%; margin-left: 1%;"></textarea>
              </div>
            </div>

            <div [hidden]="!showRenewalofDomain">
              <div class="row">
                <div class="col">
                  <label>Domain Name<span style="color:red"> *</span></label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Due Date<span style="color:red"> *</span></label>
                  <input type="date" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Used in which Location<span style="color:red"> *</span></label>
                  <ng-multiselect-dropdown style="width:30%;" [settings]="dropdownDepartmentSettings"
                                           [data]="dropdownListDepartment" [(ngModel)]="selecteddepartmentNames"
                                           (ngModelChange)="onSelecteddepartmentItemsChange()">
                  </ng-multiselect-dropdown>

                </div>
                <div class="col">
                  <label>Used in which Departmant<span style="color:red"> *</span></label>
                  <select value="Select Departmant">
                    <option>Development</option>
                    <option>Production</option>
                    <option>Testing</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col">
                  <label>How many Users?<span style="color:red"> *</span></label>
                  <input type="number" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Renewal required for what period(In years)<span style="color:red"> *</span></label>
                  <input type="number" style="width: 98%; margin-left: 1%;" />
                </div>
              </div>

              <div class="row">
                <label>Justification<span style="color:red"> *</span></label>
                <textarea class="textarea-implement" style="width: 98%; margin-left: 1%;"></textarea>
              </div>
            </div>

            <div [hidden]="!showNewSSLCertificate">
              <div class="row">
                <div class="col">
                  <label>Domain Name<span style="color:red"> *</span></label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Types of SLL<span style="color:red"> *</span></label>
                  <select value="Select Departmant">
                    <option>Extended Validation(EV SSL)</option>
                    <option>Organizational Validated(OV SSL)</option>
                    <option>Domain Validated(DV SSL)</option>
                  </select>
                </div>
              </div>
              <div class="row">
                <label>Justification<span style="color:red"> *</span></label>
                <textarea class="textarea-implement" style="width: 98%; margin-left: 1%;"></textarea>
              </div>
            </div>

            <div [hidden]="!showRenewalofSSLCaertificate">
              <div class="row">
                <div class="col">
                  <label>Domain Name<span style="color:red"> *</span></label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>
                <div class="col">
                  <label>Types of SLL<span style="color:red"> *</span></label>
                  <select value="Select Departmant">
                    <option>Extended Validation(EV SSL)</option>
                    <option>Organizational Validated(OV SSL)</option>
                    <option>Domain Validated(DV SSL)</option>
                  </select>
                </div>

                <div class="col">
                  <label>Due Date<span style="color:red"> *</span></label>
                  <input type="date" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Renewal required for what period(In years)<span style="color:red"> *</span></label>
                  <input type="number" style="width: 98%; margin-left: 1%;" />
                </div>

              </div>

              <div class="row">
                <label>Justification<span style="color:red"> *</span></label>
                <textarea class="textarea-implement" style="width: 98%; margin-left: 1%;"></textarea>
              </div>

            </div>

            <div [hidden]="!showDiscontinuationofDomain">

              <div class="row">
                <div class="col">
                  <label>Domain Name<span style="color:red"> *</span></label>
                  <input type="text" style="width: 98%; margin-left: 1%;" />
                </div>

                <div class="col">
                  <label>Discontinuation Date<span style="color:red"> *</span></label>
                  <input type="date" style="width: 98%; margin-left: 1%;" />
                </div>

              </div>

            </div>

            <div class="row">
              <label>Attachment</label>
              <input type="file" style="width: 98%; margin-left: 1%;" />
            </div>
            <div class="row">
              <label>Description</label>
              <textarea class="textarea-implement" style="width: 98%; margin-left: 1%;"></textarea>
            </div>
          </div>
          <div class="row">
            <div class="col">
              <span class="btn-sub software_submit">Submit</span>
            </div>
            <div class="col">
              <span style="margin-left: -30%;" class="btn-sub" [routerLink]="'/service'">Cancel</span>
            </div>
            <div class="col"></div>
            <div class="col"></div>
            <div class="col"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
