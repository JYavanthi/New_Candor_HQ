<button class="proManagementBackBtn" (click)="navigateToLesonLearned()">Go Back</button>
<form [formGroup]="templateForm">
  <div class="card service_card br-top-blue">
    <div class="card">
      <div class="card-body">
        <div class="row">
          <div class="inputFields">
            <div>
              <label class="asteriskrequired" for="templateName" customLabelAlert="Template Name is Required">Template Name</label>
              <input type="text" formControlName="templateName" name="templateName" id="templateName">
            </div>
            <div class="textAreaDiv">
              <label class="asteriskrequired" for="question">Question</label>
              <textarea class="textAreaClass" formControlName="question" name="question" id="question"></textarea>
            </div>
            <div>
              <label class="asteriskrequired" for="type" customLabelAlert="Select Type of Input">Type of input</label>
              <select formControlName="type" name="type" id="type">
                <option value="" selected hidden disabled>Select Status</option>
                <option value="Input">Input</option>
                <option value="Dropdown">Dropdown</option>
                <option value="Checkbox">Checkbox</option>
                <option value="Radio">Radio</option>
              </select>
            </div>
            <div *ngIf="templateForm.controls['type'].value=='Dropdown' || templateForm.controls['type'].value=='Radio'">
              <label class="asteriskrequired" for="value">Value</label>
              <input type="text" formControlName="value" name="value" id="value">
            </div>
            <div class="checkboxClass">
              <label><input type="checkbox" formControlName="mandatory" name="mandatory"
                  id="mandatory">Mandatory</label>
              <button class="actionBtn" (click)="addQuestion()">Add</button>
            </div>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Question</th>
                <th>Input Type</th>
                <th>Values</th>
                <th>Mandatory</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let template of templateDetailsList;let i =index;">
                <td>{{template.question}}</td>
                <td>{{template.type}}</td>
                <td>{{template.value}}</td>
                <td>{{template.mandatory}}</td>
                <td>
                  <i class="fa fa-pencil-square-o" (click)="edit(template, i)"></i>
                  <i class="fa fa-trash" (click)="delete(template,i)"></i>
                </td>
              </tr>
              <tr *ngIf="templateDetailsList?.length == 0">
                <td colspan="6" style="text-align: center;">
                  <i style="color: #3e8cba;font-size: 20px;" class="fa fa-search"></i>
                  No Data Available
                </td>
              </tr>

            </tbody>
          </table>
        </div>
        <div class="mainBtnsDiv">
          <button class="actionBtn" (click)="saveTemplate()">Save Template</button>
          <!-- <button class="actionBtn" (click)="clearForm()">Clear</button> -->
        </div>
      </div>
    </div>
  </div>
</form>
