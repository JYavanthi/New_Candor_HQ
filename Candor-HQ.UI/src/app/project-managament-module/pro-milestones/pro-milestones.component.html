<div style="display: flex; margin-bottom: 1%;
    margin-top: -1%;">
  <button class="addNewBtn-addNew" (click)="navigateToAdd(projectID)" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')">Add New</button>
  <div style="display: flex !important; justify-content: center !important;" class="capsule">
    <div class="toggle-wrapper">
      <button class="toggle-button" [ngClass]="{ 'active': isOpenIssues }" (click)="filterMilestoneList('Pending')">
        Open
      </button>
      <button class="toggle-button" [ngClass]="{ 'active': !isOpenIssues }" (click)="filterMilestoneList('Closed')">
        Closed
      </button>
    </div>
  </div>
</div>



<div class="pm-table-wrapper">
  <div class="table-container">
    <table class="pm-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Owner</th>
          <th>Actual Start Date</th>
          <th>Actual End Date</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr class="pm-table-row" *ngFor="let milestone of paginatedData">
          <td>{{ milestone.milestoneTitle }}</td>

          <!-- <td>
            <span class="status-pill" [ngClass]="milestone.milestoneStatus">
              {{ milestone.milestoneStatus }}
            </span>
          </td> -->

          <td> <span class="status-pill" [ngClass]="{
      'completed': milestone.milestoneStatus === 'Completed',
      'inprogress': milestone.milestoneStatus === 'In Progress',
      'cancelled': milestone.milestoneStatus === 'Cancelled',
      'active': milestone.milestoneStatus === 'Active',
      'approved': milestone.milestoneStatus === 'Approved',
      'ontrack' : milestone.milestoneStatus === 'On Track',
      'onhold' : milestone.milestoneStatus === 'On Hold',
      'delayed' : milestone.milestoneStatus === 'Delayed' 
        }">
              {{ milestone.milestoneStatus }}
            </span></td>

          <td>{{ milestone.priority }}</td>
          <td>{{ milestone.ownerName }}</td>
          <td>{{ milestone.actualStartDt | date:'dd/MM/yyyy' }}</td>
          <td>{{ milestone.actualEndDt | date:'dd/MM/yyyy' }}</td>

          <td class="pm-actions">
            <i class="fa fa-pencil-square-o" (click)="navigateToView(projectID, milestone.projMilestoneId)"></i>

            <i class="fa-solid fa-trash" (click)="delete(milestone.projMilestoneId)" *ngIf="!(projectdetails?.projectStatus=='Cancel'
                     || projectdetails?.projectStatus=='Discontinue'
                     || projectdetails?.projectStatus=='Completed'
                     || projectdetails?.projectStatus=='Approved')">
            </i>
          </td>
        </tr>

        <tr *ngIf="milestoneList?.length === 0">
          <td colspan="7" class="pm-no-data">
            <i class="fa fa-search"></i> No Data Available
          </td>
        </tr>
      </tbody>
    </table>

    <mat-paginator *ngIf="milestoneList?.length > 0" [length]="milestoneList.length" [pageSize]="pageSize"
      [pageIndex]="pageIndex" [pageSizeOptions]="[10,25,50,100]" (page)="onPageChange($event,false)"
      style="padding-right: 22%;">
    </mat-paginator>
  </div>
</div>
