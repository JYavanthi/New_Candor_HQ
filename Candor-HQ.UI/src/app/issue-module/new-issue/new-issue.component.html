<div class="container" style="margin-top: 2%; margin-bottom: 5%;">

      <div class="container">
        <div class="container-field-line">
          <div class="text-center subHeadingparaCss" style="margin-top:-3%;">
            <p>Details</p>
          </div>
          <div class="card report_issue_card container-implement" style="margin-left:3%;">
            <div class="card-body">

              <div class="row">
                <div class="col">
                  <label>Raised Date<span style="color:red"> *</span></label>
                  <input readonly type="date" />
                </div>
                <div class="col">
                  <label>Plant<span style="color:red"> *</span></label>
                  <select>
                    <option value="" selected disabled hidden>Select Plant</option>
                    <option></option>
                  </select>
                </div>
                <div class="col">
                  <label>Service-Category<span style="color:red"> *</span></label>
                  <select>
                    <option value="" selected disabled hidden>Select Service Category</option>
                    <option>
                      <!--{{value.categoryName}}-->
                    </option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col">
                  <label>Sub-Category<span style="color:red"> *</span></label>
                  <select>
                    <option value="" selected disabled hidden>Select Sub-Category</option>
                    <option>
                      <!--{{valueCtype.categoryType}}-->
                    </option>
                  </select>
                </div>

                <div class="col">
                  <label>Priority<span style="color:red"> *</span></label>
                  <select>
                    <option value="" selected disabled hidden>Select Priority</option>
                    <option>
                      <!--{{valueprio.priorityName}}-->
                    </option>
                  </select>
                </div>
                <div class="col">
                  <label>Type</label><br />
                  <select>
                    <option value="" selected disabled hidden>Select Type</option>
                    <option>Type</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col">
                  <div>
                    <label>Source</label><br />
                    <select>
                      <option value="" selected disabled hidden>Select Source</option>
                      <option value="E-mail">E-mail</option>
                      <option value="Phone">Phone</option>
                      <option value="Website">Website</option>
                    </select>
                  </div>
                </div>

                <div class="col">
                  <label>Impacted Asset</label>
                  <select>
                    <option value="" selected disabled hidden>Select Impacted Asset</option>
                    <option>
                      <!--{{valueasset.category + ' ' + '-' + ' ' + valueasset.assetNo}}-->
                    </option>
                  </select>
                </div>

                <div class="col">
                  <label>Assign To</label>
                  <select>
                    <option value="" selected disabled hidden>Select Assign to</option>
                    <option>
                      <!--{{assgn.empId+' '+'-'+' '+assgn.firstName+' '+assgn.middleName+' '+assgn.lastName }}-->
                    </option>
                  </select>
                </div>

              </div>

              <div class="row">
                <div class="col">
                  <div>
                    <label>Subject<span style="color:red"> *</span></label><br />
                    <input style="padding:6px;" />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col">
                  <div class="report_description">
                    <label>Description<span style="color:red">*</span></label>
                    <!--<angular-editor #editor></angular-editor>-->
                  </div>
                </div>
                <div class="row">
                  <div class="col">
                    <div class="report_attachment">
                      <label>Attach Document</label>
                      <input type="file">
                      <div>
                        <p>Attachment: <button style="padding: 1%; border: none; background: none;"><i class="fa fa-download" aria-hidden="true"></i></button></p>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col">
                    <div>
                      <label>Proposed Resolution Date<span style="color:red"> *</span></label><br />
                      <input type="datetime-local" />
                    </div>
                  </div>
                </div>
              </div>

              <span class="btn-sub">Draft</span>
              <span class="btn-sub">Submit</span>
              <span class="btn-sub">Back</span>
