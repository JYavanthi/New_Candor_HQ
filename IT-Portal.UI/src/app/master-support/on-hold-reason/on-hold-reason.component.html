<div class="Heading">
  <div class="text-center pageHeadingCss">
    <p class="pageHeadingparaCss" style="position: relative;top: 7px;">On Hold Reason</p>
  </div>
  <div class="newBtn">
    <button class="new" [routerLink]="'/newonholdreasonmaster'">New</button>
  </div>
</div>
<br>

<div class="tableBox">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>On Hold Reason</th>
          <th>Category Name</th>
          <th>Category Type Name</th>
          <th>Is Active</th>
          <th style="text-align: center;">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let reason of reasonList">
          <td>{{ reason.onholdReason }}</td>
          <td>{{ reason.categoryName?reason.categoryName:'-' }}</td>
          <td>{{ reason.typeName?reason.typeName:'-' }}</td>
          <td>True</td>
          <td style="text-align: center;">
            <i class="fa fa-pencil-square-o cursor-pointer" (click)="navigateToView(reason)"></i>
            <i (click)="deleteReasondata(reason)" class="fa fa-trash cursor-pointer"></i>
          </td>
        </tr>

        <tr *ngIf="reasonList?.length === 0">
          <td colspan="6" style="text-align: center;">
            <i style="color: #3e8cba;font-size: 20px;" class="fa fa-search"></i>
            No Data Available
          </td>
        </tr>

      </tbody>
    </table>
  </div>

      <div>

              style="margin-right:34%">
          </mat-paginator>
      </div>
  </div> -->
  
</div>
