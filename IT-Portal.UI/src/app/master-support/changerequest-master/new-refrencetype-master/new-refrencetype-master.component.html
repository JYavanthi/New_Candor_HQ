<div class="referceTypeMainDiv">

  <div style="margin-left:3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="container-implement">

    <!-- Heading -->
    <h3 class="page-heading">NEW REFERENCE TYPE</h3>

    <div class="container-field-line">
      <div class="border-rfc-heading">

        <div class="row mt-2">

          <div class="col form-group">
            <label>ReferenceType ID</label>
            <input class="form-control-custom" type="text" placeholder="Reference Type ID"
              [(ngModel)]="referenceTypeId" />
          </div>

          <div class="col form-group">
            <label>Reference Type</label>
            <input class="form-control-custom" type="text" placeholder="Reference Type" [(ngModel)]="referenceType" />
          </div>

          <div class="col form-group">
            <label>Is Active</label>
            <select class="form-control-custom" [(ngModel)]="isActive">
              <option [ngValue]="true">True</option>
              <option [ngValue]="false">False</option>
            </select>
          </div>

        </div>

        <!-- Buttons -->
        <div class="btn-section">
          <button (click)="postReferenceType()" class="btn submit-btn">SUBMIT</button>
          <button [routerLink]="'/Refrencetype'" class="btn back-btn">BACK</button>
        </div>

      </div>
    </div>

  </div>
</div>
