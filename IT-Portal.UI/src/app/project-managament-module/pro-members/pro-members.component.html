<div>
    <button class="addNewBtn" (click)="navigateTo()" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')">Add New</button>
</div>

<div *ngIf="membersForm.disabled" class="tableDesign">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Employee Name</th>
                    <th>Employee ID</th>
                    <th>Participants or Followers</th>
                    <th>Type</th>
                    <th>Department</th>
                    <th>Designation</th>
                    <th>Is Responsible</th>
                    <th>Is Accountable</th>
                    <th>Is Consulted</th>
                    <th>Is Informed</th>
                    <th>Action</th>
            </thead>
            <tbody>
                <tr *ngFor="let member of memberList">
                    <td>{{member.memberName}}</td>
                    <td>{{member.empId}}</td>
                    <td>{{member.role}}</td>
                    <td>{{member.type}}</td>
                    <td>{{member.department}}</td>
                    <td>{{member.designation}}</td>
                    <td><input type="checkbox" [ngModel]="member.responsible" disabled /></td>
                    <td><input type="checkbox" [ngModel]="member.accountable" disabled /></td>
                    <td><input type="checkbox" [ngModel]="member.consulted" disabled /></td>
                    <td><input type="checkbox" [ngModel]="member.informed" disabled /></td>
                    <td>    
                    <i class="fa fa-eye ms-3 mt-3 cursor-pointer" aria-hidden="true" style="    margin-right: 8px;"
                    (click)="navigateToView(member.prMemberId, member.projectMgmtId)"></i>
                        <i class="fa-solid fa-trash cursor-pointer" (click)="deleteMembers(member.prMemberId)" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
    || this.projectdetails?.projectStatus == 'Approved')" style="    margin-left: 8px;"></i>
                    </td>
                </tr>
                <tr *ngIf="memberList?.length === 0">
                    <td colspan="6" style="text-align: center;">
                        <i style="color: #3e8cba;font-size: 20px;" class="fa fa-search"></i>
                        No Data Available
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
