<div class="text-center">
    <h1>RACI Report</h1>
</div>
<div class="card service_card br-top-blue">
    <div class="card">
        <div class="card-body">
            <div class="row">
                <div class="container-home">
                    <div class="text-center">
                        <h1>Reports</h1>
                    </div>
                    <div class="row generate_row">
                        <div class="col-3">
                            <label for="selector">Select Project</label>&nbsp;
                            <select (change)="onOptionSelected($event)">
                                <option value="" disabled selected hidden>Select-Project</option>
                                <option *ngFor="let ptoject of projectManagementList" [value]="ptoject.projectMgmtId">
                                    {{ptoject.projectCode+'-'+ptoject.projectName}}</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tableDesign">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Employee Name</th>
                            <th>Employee ID</th>
                            <th>Participants or Followers</th>
                            <th>Type</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Is Responsible</th>
                            <th>Is Accountable</th>
                            <th>Is Consulted</th>
                            <th>Is Informed</th>
                    </thead>
                    <tbody>
                        <tr *ngFor="let member of memberList">
                            <td>{{member.memberName}}</td>
                            <td>{{member.empId}}</td>
                            <td>{{member.role}}</td>
                            <td>{{member.type}}</td>
                            <td>{{member.department}}</td>
                            <td>{{member.designation}}</td>
                            <td><input type="checkbox" [ngModel]="member.responsible" disabled /></td>
                            <td><input type="checkbox" [ngModel]="member.accountable" disabled /></td>
                            <td><input type="checkbox" [ngModel]="member.consulted" disabled /></td>
                            <td><input type="checkbox" [ngModel]="member.informed" disabled /></td>
                        </tr>
                        <tr *ngIf="memberList?.length === 0">
                            <td colspan="6" style="text-align: center;">
                                <i style="color: #3e8cba;font-size: 20px;" class="fa fa-search"></i>
                                No Data Available
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
