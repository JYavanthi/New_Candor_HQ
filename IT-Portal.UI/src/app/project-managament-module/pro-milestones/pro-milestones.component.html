<div style="display: flex">
  <button class="addNewBtn" (click)="navigateToAdd(projectID)" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')">Add New</button>
  <div style="display: flex !important; justify-content: center !important;" class="capsule">
    <div class="toggle-wrapper">
      <button class="toggle-button" [ngClass]="{ 'active': isOpenIssues }" (click)="filterMilestoneList('Pending')">
        Open
      </button>
      <button class="toggle-button" [ngClass]="{ 'active': !isOpenIssues }" (click)="filterMilestoneList('Closed')">
        Closed
      </button>
    </div>
  </div>
</div>

<div class="tableDesign">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <!-- <th>SL. No.</th> -->
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Owner</th>
          <th>Actual Start Date</th>
          <th>Actual End Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let milestone of paginatedData">
          <!-- <td>{{}}</td> -->
          <td>{{milestone.milestoneTitle}}</td>
          <td>{{milestone.milestoneStatus}}</td>
          <td>{{milestone.priority}}</td>
          <td>{{milestone.ownerName}}</td>
          <td>{{milestone.actualStartDt | date: 'dd/MM/yyy'}}</td>
          <td>{{milestone.actualEndDt | date: 'dd/MM/yyyy'}}</td>
          <td>
            <i class="fa fa-pencil-square-o cursor-pointer"
              (click)="navigateToView(projectID,milestone.projMilestoneId)"></i>
            <i class="fa-solid fa-trash cursor-pointer" (click)="delete(milestone.projMilestoneId)" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')"></i>
          </td>
        </tr>
        <tr *ngIf="milestoneList?.length === 0">
          <td colspan="6" style="text-align: center;">
            <i style="color: #3e8cba;font-size: 20px;" class="fa fa-search"></i>
            No Data Available
          </td>
        </tr>

      </tbody>
    </table>

    <div class="mb-5">
      <div *ngIf="milestoneList?.length > 0">
        <mat-paginator [length]="milestoneList?.length" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[10, 25, 50, 100]" (page)="onPageChange($event,false)" aria-label="Select page"
          style="margin-right:34%">
        </mat-paginator>
      </div>
    </div>

  </div>
</div>
