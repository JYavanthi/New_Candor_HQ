<form [formGroup]="milestoneForm">
  <div class="card service_card br-top-blue">
    <div class="card">
      <div class="card-body">

        <div class="row">
          <div class="inputFields">
            <div>
              <label class="asteriskrequired" for="proMilestonetitle">Title</label>
              <input type="text" formControlName="proMilestonetitle" name="proMilestonetitle" id="proMilestonetitle" />
            </div>


            <div>
              <label class="asteriskrequired" for="status">Status</label>
              <select formControlName="status" name="status" id="status">
                <option value="" selected hidden disabled>Select Status</option>
                <option>Active</option>
                <option>In Progress</option>
                <option>Delayed</option>
                <option>On Track</option>
                <option>On Hold</option>
                <option>Approved</option>
                <option>Cancelled</option>
                <option>Completed</option>
              </select>
            </div>

            <div style="position: relative;">
              <label class="asteriskrequired" for="owner">Owner</label>
              <!-- <input type="text" formControlName="owner" name="owner" id="owner" /> -->
              <input type="text" formControlName="owner" name="owner" id="owner" placeholder="Enter Employee ID"
                (input)="filterItem()">
              <ul class="dropdowns-list" *ngIf="employeeList?.length > 0">
                <li class="drop-list" value="" *ngFor="let item of employeeList" (click)="selectItem(item)">
                  {{ item.employeeId + ' ' + '-' + ' ' + item.employeeName }}
                </li>
              </ul>
            </div>

            <div>
              <label class="asteriskrequired" for="priority">Priority</label>
              <select formControlName="priority" name="priority" id="priority">
                <option value="" selected hidden disabled>Select Priority</option>
                <option>None</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">

          <span class="subHeading">Schedule</span>
          <div class="inputFields">

            <div>
              <label class="asteriskrequired" for="scheduleStartDateFrom">Start Date</label>
              <!-- <input type="date" formControlName="scheduleStartDateFrom" name="scheduleStartDateFrom"
                (change)="SOnDateChange()" id="scheduleStartDateFrom" [max]="milestoneForm.value.scheduleToDate" /> -->
              <input type="date" formControlName="scheduleStartDateFrom" name="scheduleStartDateFrom"
                (change)="SOnDateChange()" id="scheduleStartDateFrom"
                [min]="this.projectdetails?.startDt?.split('T')[0]"
                [max]="this.milestoneForm.value['scheduleToDate']" />
            </div>

            <div>
              <label class="asteriskrequired" for="scheduleToDate">End Date</label>
              <input type="date" formControlName="scheduleToDate" name="scheduleToDate" id="scheduleToDate"
                [min]="this.projectdetails?.startDt?.split('T')[0]" [max]="this.projectdetails?.endDt?.split('T')[0]"
                [min]="milestoneForm.value.scheduleStartDateFrom" />
            </div>
          </div>
        </div>
        <!-- <div class="row">
          <span class="subHeading">Actual</span>
          <div class="inputFields">
            <div>
              <label for="actualStartDTFromDate">Start Date</label>
              <input type="date" formControlName="actualStartDTFromDate" name="actualStartDTFromDate"
                (change)="aOnDateChange()" id="actualStartDTFromDate" 
                [min]="milestoneForm.value.actualStartDTFromDate" />
            </div>
            <div>
              <label for="actualStartDTToDate">End Date</label>
              <input type="date" formControlName="actualStartDTToDate" name="actualStartDTToDate"
                id="actualStartDTToDate" [min]="milestoneForm.value.actualStartDTFromDate"
                />
            </div>
          </div>
        </div> -->

        <div class="row">
          <span class="subHeading">Actual</span>
          <div class="inputFields">
            <div>
              <label for="actualStartDTFromDate">Start Date</label>
              <input type="date" id="actualStartDTFromDate" formControlName="actualStartDTFromDate"
                name="actualStartDTFromDate" (change)="aOnDateChange()" />
            </div>

            <div>
              <label for="actualStartDTToDate">End Date</label>
              <input type="date" id="actualStartDTToDate" formControlName="actualStartDTToDate"
                name="actualStartDTToDate" [min]="milestoneForm.value.actualStartDTFromDate" />
            </div>
          </div>
        </div>


        <div>
          <label class="asteriskrequired" for="description">Description</label>
          <textarea class="textAreaClass" formControlName="description" name="description" id="description"></textarea>
          <!-- <angular-editor #editor [config]="editorConfig" formControlName="description"
            [disabled]="milestoneId"></angular-editor> -->
        </div>

        <div class="mainBtnsDiv">
          <button class="actionBtn" (click)="submitMilestone()" *ngIf="!(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')">{{milestoneId? 'Update' : 'Submit'}}</button>
          <button class="actionBtn" *ngIf="!milestoneId" (click)="clearForm()">Clear</button>
        </div>
      </div>
    </div>
  </div>
</form>
