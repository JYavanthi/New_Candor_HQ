<form [formGroup]="taskForm">
  <div class="card service_card br-top-blue">
    <div class="card">
      <div class="card-body">
       
        <div class="row">
          <div class="inputFields">

            <div>
              <label class="asteriskrequired" for="taskTitle">Task Title</label>
              <input type="text" formControlName="taskTitle" name="taskTitle" id="taskTitle" />
            </div>

            <div>
              <label class="asteriskrequired" for="milestone">Milestone</label>
              <select formControlName="milestone" name="milestone" id="milestone" (change)="onMilestoneChange()"
                (change)="getmilestonetask($event)">
                <option value="" selected hidden disabled>Select Milestone...</option>
                <option *ngFor="let mileStone of mileStoneList" [value]="mileStone.projMilestoneId">
                  {{ mileStone.milestoneTitle }}
                </option>
              </select>
            </div>

            <div>
              <label class="asteriskrequired" for="ProjectPhase">Project phase</label>
              <select formControlName="ProjectPhase" name="ProjectPhase" id="ProjectPhase">
                <option value="" selected disabled hidden>Select Project phase...</option>
                <option value="Initiation Phase">Initiation Phase</option>
                <option value="Planning Phase">Planning Phase</option>
                <option value="Execution Phase">Execution Phase</option>
                <option value="Testing Phase">Testing Phase</option>
                <option value="Close Phase">Close Phase</option>
              </select>
            </div>

            <div>
              <label class="asteriskrequired" for="isThisSubtask" customLabelAlert="Confirm Subtask">Is This
                Subtask</label>
              <select formControlName="isThisSubtask" name="isThisSubtask" id="isThisSubtask">
                <option disabled value="" selected hidden>Select Yes/No...</option>
                <option [ngValue]="true">Yes</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>

            <div [hidden]="!this.taskForm.get('isThisSubtask')?.value">
              <label for="parentTask">Parent Task</label>
              <select formControlName="parentTask" name="parentTask" id="parentTask" (change)="changeParenttask()">
                <option value="" selected hidden disabled>Select Parent Task...</option>
                <option *ngFor="let task of tasklist" [value]="task.taskId">{{ task.taskTitle }}</option>
              </select>
            </div>
            <div>
              <label for="plannedCost">Planned Cost</label>
              <input type="number" formControlName="plannedCost" name="plannedCost" id="plannedCost" />
            </div>

            <div>
              <label for="actualCost">Actual Cost</label>
              <input type="number" formControlName="actualCost" name="actualCost" id="actualCost" />
            </div>

            <div>
              <label for="assignedTo">Assigned to</label>
              <select formControlName="assignedTo" name="assignedTo" id="assignedTo">
                <option value="" selected disabled hidden>Select Assigned to</option>
                <option *ngFor="let member of MemberList" [value]="member.prMemberId">{{member.empId}} -
                  {{member.memberName}}</option>
              </select>
            </div>

            <div>
              <label for="workHours">Work Hours</label>
              <input type="time" formControlName="workHours" name="workHours" id="workHours" />
            </div>

            <div>
              <label class="asteriskrequired" for="status">Status</label>
              <select formControlName="status" name="status" id="status">
                <option value="" selected hidden disabled>Select Status</option>
                <option>Open</option>
                <option>In Progress</option>
                <option>In Review</option>
                <option>To Be Tested</option>
                <option>Resolved</option>
              </select>
            </div>

            <div>
              <label for="Dependency">Dependency</label>
              <input type="text" formControlName="Dependency" name="Dependency" id="Dependency" />
            </div>


            <div>
              <label class="asteriskrequired" for="priority">Priority</label>
              <select formControlName="priority" name="priority" id="priority">
                <option value="" selected hidden disabled>Select Priority</option>
                <option>None</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
              </select>
            </div>
          </div>
          <div class="row">
            <span class="subHeading">Schedule</span>
            <div class="row">
              <div class="inputFields">


                <div>
                  <label class="asteriskrequired" for="startDate">Start Date</label>
                  <input type="date" formControlName="startDate" name="startDate" id="startDate" 
                    (change)="onDateChange()" [min]="this.milestonestartDt" [max]="milestoneendDt" />
                </div>
                <div>
                  <label class="asteriskrequired" for="dueDate">Due Date</label>
                  <input type="date" formControlName="dueDate" name="dueDate" id="dueDate"
                    [min]="this.taskForm.value['startDate']" [max]="milestoneendDt"
                    [min]="parentTaskData?.startDt.split('T')[0]" [max]="parentTaskData?.endDt.split('T')[0]"  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <span class="subHeading">Actual</span>
            <div class="inputFields">

              <div>
                <label for="ActualStartDate">Start Date</label>
                <input type="date" formControlName="ActualStartDate" name="ActualStartDate" id="ActualStartDate"
                  (change)="onDateChangeA()" />
              </div>

              <div>
                <label for="ActualDueDate">Due Date</label>
                <input type="date" formControlName="ActualDueDate" name="ActualDueDate" id="ActualDueDate"
                  [min]="this.taskForm.value.ActualStartDate" />
              </div>
            </div>
          </div>

          <div class="textAreaDiv">
            <!-- <label class="asteriskrequired" for="duration">Attachment</label> -->
            <app-pr-attachment [tabID]="taskId" [title]="'Attachment'" (attachMentListEvent)="getAttchmentList($event)"
              (removeAttchment)="removeAttchment($event)"></app-pr-attachment>
          </div>

          <div class="textAreaDiv">
            <label class="asteriskrequired" for="Discription">Description</label>
            <textarea formControlName="Discription" name="Discription" class="textAreaClass"
              id="Discription"></textarea>
            <!-- <angular-editor [ngClass]="{'disabledEditor':disabledAngularEditor}" #editor [config]="editorConfig"
              formControlName="Discription"></angular-editor> -->
          </div>

          <div class="textAreaDiv">
            <label for="AdditionalNotes">Additional Notes</label>
            <textarea class="textAreaClass" formControlName="AdditionalNotes" name="AdditionalNotes"
              id="AdditionalNotes"></textarea>
            <!-- <angular-editor [ngClass]="{'disabledEditor':disabledAngularEditor}" #editor [config]="editorConfig"
              formControlName="AdditionalNotes"></angular-editor> -->
          </div>

        </div>
      </div>

      <div class="mainBtnsDiv" style="margin: 15px;">
        <button class="actionBtn" (click)="submitTask()" *ngIf="!taskId">Submit</button>
        <button class="actionBtn" (click)="submitTask()" *ngIf="(taskId&&this.taskData?.status!='Resolved')&&
          !(this.projectdetails?.projectStatus=='Cancel'||this.projectdetails?.projectStatus=='Discontinue'||this.projectdetails?.projectStatus=='Completed'
        || this.projectdetails?.projectStatus == 'Approved')">Update</button>
        <button class="actionBtn" (click)="clearForm()" *ngIf="!taskId">Clear</button>
        <!-- <button class="actionBtn" (click)="submitTask('Open')">Submit</button>
          <button class="actionBtn" *ngIf="!projectId" (click)="clearForm()">Clear</button> -->
      </div>
    </div>
  </div>
</form>
