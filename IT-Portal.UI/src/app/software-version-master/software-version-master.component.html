<div class="sofetwareVersionMainDiv">

  <div style="margin-left: 3%;">
    <app-support-sidebar></app-support-sidebar>
  </div>

  <div class="contentSection">

    <!-- Header -->
    <div class="topHeader">
      <div class="title">Software Master Version</div>

      <div class="searchBox">
        <i class="fa fa-search"></i>
        <input type="text" [(ngModel)]="searchText" (input)="filterData()" placeholder="Search Category Name">
      </div>

      <div class="newBtn" [routerLink]="'/newsoftwareVersionMaster'">
        <i class="fa fa-plus-circle"></i>
        NEW
      </div>
    </div>

    <!-- Table Card -->
    <div class="tableCard">
      <table>
        <thead>
          <tr>
            <th>SR. NO.</th>
            <th>Software Version</th>
            <th>Is Active</th>
            <th style="text-align:center;">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let data of softwareVersinList; let i = index">
            <td class="blueText">{{ i + 1 }}</td>
            <td class="blueText">{{ data.softVersionName }}</td>

            <td>
              <span [ngClass]="data.isActive ? 'active' : 'inactive'">
                {{ data.isActive ? 'True' : 'False' }}
              </span>
            </td>

            <td class="actionCell">
              <span class="editIcon" (click)="navigateTo(data.softVersionId)">
                <i class="fa fa-pencil"></i>
              </span>

              <span class="deleteIcon" (click)="deleteRow(data.softVersionId)">
                <i class="fa fa-trash"></i>
              </span>
            </td>
          </tr>

          <tr *ngIf="softwareVersinList?.length === 0">
            <td colspan="4" class="noData">
              <i class="fa fa-search"></i> No Data Available
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>
