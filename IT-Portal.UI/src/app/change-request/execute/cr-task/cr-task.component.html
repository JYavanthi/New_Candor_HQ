''
<div style="margin-left: 6%;">
  <button class="btn-back" (click)="goToTab('contact')">Back</button>
</div>
<app-common [crid]="crid"></app-common>
<br />

<div class="notification" *ngIf="errorMessage">
  <button class="close-btn" (click)="clearErrorMessage()"><span style="color:black;">X</span></button>
  <p class="message-txt">{{ errorMessage }}</p>
</div>
<div class="success" *ngIf="successMessage">
  <button class="close-btn" (click)="clearSuccessMessage()"><span style="color:black;">X</span></button>
  <p class="message-txt">{{ successMessage }}</p>
</div>

<div class="container-home">

  <!--breadcrumb-->

  <nav style="width:39%;" aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a (click)="goToTab('contact')">Implementation Plan</a></li>
      <li class="breadcrumb-item active" aria-current="page" *ngFor="let pltdata of taskname">{{pltdata.sysLandscape1}}</li>
      <li class="breadcrumb-item active" aria-current="page">New Task</li>
    </ol>
  </nav>

  <div class="container-field1">
    <div class="row">
      <!--<div class="col">
        <label>Task # 1</label>
        <input type="text" />
      </div>-->
      <div class="col">
        <label>Planned Start Date</label>
        <input [(ngModel)]="startDtValue" type="date" />
      </div>
      <div class="col">
        <label>Planned End Date</label>
        <input [(ngModel)]="endDTValue" type="date" />
      </div>
      <div class="col">
        <label>Status</label>
        <select [(ngModel)]="statusece" (change)="changestatusece()" >
          <option value="" selected disabled hidden >Select Status</option>
          <option value="Assigned">Assigned</option>
          <option value="Unassigned">Unassigned</option>
          <option value="Onhold">Onhold</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div class="col">
        <label>Assigned To</label>
        <!--<select [(ngModel)]="assignedTo">
          <option>Select assigned to</option>
          <option *ngFor="let refdata of employeeid ">{{refdata.firstName}}</option>
        </select>-->
        <input class="searchinput" type="text" placeholder="Enter Employee Name" [(ngModel)]="assignedTo" (input)="filterassignedItems()" />
        <ul class="dropdowns-list">
          <li class="drop-list" *ngFor="let item of dropdownassignedItems" (click)="selectItemasignto(item)">{{item}}</li>
        </ul>
      </div>
    </div>
    <div class="row mt-3">

      <!--<div class="col">
        <label>Forward Status</label>
        <Select [(ngModel)]="forwardStatus" class="category-execute">
          <option>Select Forwarded Status</option>
          <option value="Forwarded">Forwarded</option>
          <option value="Not Forwarded">Not Forwarded</option>
        </Select>
      </div>-->
      <div class="col">
        <label>Forward Status</label>
        <select [(ngModel)]="forwardStatus">
          <option value="" selected disabled hidden>Select Forwarded Status</option>
          <option value="Forwarded">Forwarded</option>
          <option value="Not Forwarded">Not Forwarded</option>
        </select>
      </div>
      <div class="col">
        <label>Forwarded To</label>
        <input class="searchinput" type="text" placeholder="Enter Employee Name" [(ngModel)]="forwardedto" (input)="filterItems()" (ngModelChange)="forwardedToChange()" />
        <ul class="dropdowns-list">
          <li class="drop-list" *ngFor="let item of dropdownItems" (click)="selectItem(item)">{{item}}</li>
        </ul>
      </div>
      <!--<div class="col">
        <label>Forwarded To</label>
        <select [(ngModel)]="forwardedTo">
          <option disabled>Select Forwarded To</option>
          <option *ngFor="let refdata of employeeid " value="{{refdata.supportTeamId}}">{{refdata.firstName}}</option>
        </select>
      </div>-->
      <div class="col">
        <label>Forwarded Date</label>
        <input [(ngModel)]="forwardonValue" type="date" />
      </div>
      <div class="col">
        <label>Reason For Forwarding</label>
        <select [(ngModel)]="reasonForwarded">
          <option value="" selected disabled hidden>Select Reason</option>
          <option value="Not Related">Not Related</option>
          <option value="Require Help">Require Help</option>
        </select>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col">
        <label>Picked Status</label>
        <select [(ngModel)]="pickedStatus" (change)="pickedStatusChange()">
          <option value="" selected disabled hidden>Select Picked Status</option>
          <option value="Picked">Picked</option>
          <option value="Not Picked">Not Picked</option>
        </select>
      </div>
      <div class="col">
        <label>Picked Date</label>
        <input [(ngModel)]="pickedDt" type="date" />
      </div>
      <div class="col">
        <label>Actual Start Date</label>
        <input [(ngModel)]="actualStartDtValue" type="date" />
      </div>
      <div class="col">
        <label>Actual End Date</label>
        <input [(ngModel)]="actualEndDtValue" type="date" />
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label>Depend SysLandscape</label>
        <select (ngModelChange)="getdepdenttask()" [(ngModel)]="dependSysLandscape">
          <option value="" selected disabled hidden>Select Depend SysLandscape</option>
          <option *ngFor="let pltdata of systemlandscape" value="{{pltdata.sysLandscapeId}}">{{pltdata.sysLandscape1}}</option>
        </select>
      </div>
      <div class="col">
        <label>Depend Task</label>
        <select [(ngModel)]="dependTaskId">
          <option value="" selected disabled hidden>Select the task</option>
          <option *ngFor="let pltdata of depdenttask" value="{{pltdata.itcrexecId}}">{{pltdata.executionStepName}}</option>
        </select>
      </div>
      <div class="col">
      </div>
      <div class="col">
      </div>
    </div>
  </div>
  <!-- end here  -->
  <div class="container-field1">
    <div>
      <label>Execution Step Name <span style="color:red">*</span></label>
      <input [(ngModel)]="executionStepName" type="text" />
    </div> <br />
    <div>
      <!--<label for="">Notes</label>
      <textarea [(ngModel)]="executionStepDesc" class="textarea-implement" cols="160" rows="4" id="area1"></textarea>-->
      <label>Execution Step Desc <span style="color:red">*</span></label>
      <textarea [(ngModel)]="executionStepDesc" class="textarea-implement"></textarea>
    </div>
    <div>
      <label for="">Remarks</label>
      <textarea [(ngModel)]="remarks" class="textarea-implement" cols="160" rows="4"></textarea>
    </div>
    <input [(ngModel)]="status" hidden />
  </div>
  <div>
    <button class="btn-task" (click)="submitExexute()" type="submit">Submit</button>
    <button (click)="goToTab('contact')" class="btn-task">Back</button>
  </div>
  <br />
</div>
