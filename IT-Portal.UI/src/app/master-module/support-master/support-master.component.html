<div class="container-implement">
  <div class="container-field-line">
    <div class="d-flex just-cont-centre">
      <h3>Module Master</h3>
    </div>
    <button class="btn btn-primary" [routerLink]="'/mastermodule/newsupportmaster'"
      style="margin-left:92%;margin-top:-5%;width:7%;">New</button>
      <div class="col-4 pb-">
        <label>Search By Module Name</label>
        <input type="text" placeholder="Search..." (input)="serach($event.target)"/>
      </div>
    <div class="border-rfc-headi3ng">
      <div class="table-wrapper" style="overflow-x: auto">
        <table class="fl-table" style="width: 100%;">
          <thead class="table-head">
            <tr class="border-bottom">
              <!-- <th>Sl.No</th> -->
              <th>ID</th>
              <th>Module Name</th>
              <th>Parent ID</th>
              <th>IsActive</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of supportvalue;let i=index">
              <!-- <td>{{i+1}}</td> -->
              <td>{{data.supportId}}</td>
              <td>{{data.supportName}}</td>
              <td>{{data.parentId}}</td>
              <td>{{data.isActive.toString() | titlecase}}</td>
              <td>
                <a><i class="fa fa-pencil-square-o" style="cursor: pointer;" aria-hidden="true"
                    (click)="update(data.supportId)"></i></a>
                <a><i (click)="deleteRow(data.supportId)" style="cursor: pointer;" class="fa fa-trash"
                    aria-hidden="true"></i></a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf=" supportvalue.length > 0">
        <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[10, 25, 50, 100]" (page)="onPageChange($event)" aria-label="Select page"
          style="margin-right:34%">
        </mat-paginator>
      </div>
    </div>
  </div>
</div>

<div class="notification-confirm" *ngIf="deleteconfirmation">
  <p style="font-size:17px;text-align:center;">Are you sure you want to delete this?</p>
  <div style="text-align:center;">
    <button class="confirombtn" (click)="deleteYes()">Yes</button>
    <button class="confirombtn" (click)="deleteNo()">No</button>
  </div>
</div>
