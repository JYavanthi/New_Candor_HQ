<div class="main-layout">

  <!-- Sidebar (UNCHANGED) -->
  <div class="sidebar-section">
    <app-master-sidebar></app-master-sidebar>
  </div>

  <!-- Right Content -->
  <div class="content-section">

    <!-- Header -->
    <div class="module-header">
      <div class="title-section">
        <img src="assets/image/master_log.png" alt="masterModeule" class="masterModeuleImg">
        <h2>Module Master</h2>
      </div>

      <button class="new-btn" [routerLink]="'/mastermodule/newsupportmaster'">
        New <i class="fa fa-plus-circle"></i>
      </button>
    </div>

    <!-- Search Section -->
    <div class="search-section">
      <label class="labelcss">Search By Module Name:</label>

      <div class="search-box">
        <input type="text" placeholder="Search..." (input)="serach($event.target)" />
        <i class="fa fa-search"></i>
      </div>
    </div>

    <!-- Table Card -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Module Name</th>
            <th>Parent ID</th>
            <th>Is Active</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let data of supportvalue">
            <td>{{data.supportId}}</td>
            <td class="module-name">{{data.supportName}}</td>
            <td>{{data.parentId}}</td>

            <td>
              <span [ngClass]="data.isActive ? 'active-true' : 'active-false'">
                {{data.isActive.toString() | titlecase}}
              </span>
            </td>

            <td class="action-icons">
              <i class="fa fa-pencil edit-icon" (click)="update(data.supportId)"></i>

              <i class="fa fa-trash delete-icon" (click)="deleteRow(data.supportId)"></i>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Paginator -->
      <div *ngIf="supportvalue.length > 0" class="paginator">
        <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[10,25,50,100]" (page)="onPageChange($event)">
        </mat-paginator>
      </div>
    </div>

  </div>

  <!-- Delete Confirmation -->
  <div class="notification-confirm" *ngIf="deleteconfirmation">
    <p>Are you sure you want to delete this?</p>
    <div>
      <button class="confirm-btn" (click)="deleteYes()">Yes</button>
      <button class="confirm-btn" (click)="deleteNo()">No</button>
    </div>
  </div>

</div>
