<form [formGroup]="backUpForm">
    <div class="card service_card br-top-blue">
        <div class="card-body">
            <app-sr-details-self-others-guest [srData]="srData" (radioBtnValues)="getDatafromRadios($event)" />
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="requestTypeClass">
                            <div>
                                <label class="asteriskrequired">Backup Location</label>
                                <select formControlName="requestType" name="requestType"
                                    (change)="changeRequestTypeValue()">
                                    <option selected disabled hidden value="">Select Backup Location</option>
                                    <option *ngFor="let requesttype of requestTypeList" [value]="requesttype.supportId">
                                        {{requesttype.supportName}}
                                    </option>
                                </select>
                            </div>
                            <div *ngIf="backUpForm.get('requestType')?.value == 78">
                                <label class="asteriskrequired" for="selectType">Type</label>
                                <select formControlName="selectType" name="selectType" id="selectType"
                                    (change)="formValidationService.clearOpenedInputFields(backUpForm.value.selectType, backUpForm.get('provideDescriptions'), backUpForm.get('dateInput'), backUpForm.get('startDate'), backUpForm.get('endDate'))">
                                    <option selected disabled hidden value="">Select Type</option>
                                    <option value="Yes">One-time</option>
                                    <option value="No">Schedule</option>
                                </select>
                            </div>
                            <div *ngIf="backUpForm.get('requestType')?.value == 95">
                                <label class="asteriskrequired" for="email">Email ID</label>
                                <input formControlName="email" type="email" name="email" id="email" />
                                <span *ngIf="submit&&backUpForm.get('email')?.invalid">
                                    <span style="color:red">Enter a
                                        Valid Email ID</span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Backup into Tape -->
                    <div class="row"
                        *ngIf="backUpForm.get('requestType')?.value == 78 && backUpForm.get('selectType')?.value">
                        <!-- One-time -->
                        <div class="inputFields" *ngIf="backUpForm.get('selectType')?.value == 'Yes' ">
                            <div>
                                <label class="asteriskrequired" for="provideDescriptions"
                                    customLabelAlert="Please Provide Descriptions">Provide Descriptions</label>
                                <input type="text" formControlName="provideDescriptions" name="provideDescriptions"
                                    id="provideDescriptions" />
                            </div>
                            <div>
                                <label class="asteriskrequired" for="dateInput">Date</label>
                                <input type="date" [min]="formValidationService.todaysDate"
                                    [max]="formValidationService.maxDate" formControlName="dateInput" name="dateInput"
                                    id="dateInput" />
                            </div>
                        </div>

                        <!-- Schedule -->
                        <div class="inputFields" *ngIf="backUpForm.get('selectType')?.value == 'No' ">
                            <div>
                                <label class="asteriskrequired" for="startDate">Start Date</label>
                                <input type="date" formControlName="startDate" [min]="formValidationService.todaysDate"
                                    [max]="formValidationService.maxDate" name="startDate" id="startDate" />
                            </div>
                            <div>
                                <label class="asteriskrequired" for="endDate">End Date</label>
                                <input type="date" formControlName="endDate" name="endDate" id="endDate"
                                    [min]="backUpForm.value.startDate" [max]="formValidationService.maxDate" />
                            </div>
                        </div>

                    </div>

                    <!-- Backup into External Drive -->
                    <div class="row" *ngIf="backUpForm.get('requestType')?.value == 79">
                        <div class="inputFields">
                            <div>
                                <label class="asteriskrequired" for="specifyDevice"
                                    customLabelAlert="Specify the Device you're Transfering to">Specify the Device
                                    you're Transfering to</label>
                                <input type="text" formControlName="specifyDevice" name="specifyDevice"
                                    id="specifyDevice" />
                            </div>
                            <div>
                                <label class="asteriskrequired" for="provideDescriptions"
                                    customLabelAlert="Please Provide Descriptions">Provide Descriptions</label>
                                <input type="text" formControlName="provideDescriptions" name="provideDescriptions"
                                    id="provideDescriptions" />
                            </div>
                        </div>
                    </div>

                    <!-- Backup into Restoration Request -->
                    <div class="row" *ngIf="backUpForm.get('requestType')?.value == 80">
                        <div class="inputFields">
                            <div>
                                <label class="asteriskrequired" for="restorationDatePreference">Restoration Date
                                    Preference</label>
                                <input type="date" formControlName="restorationDatePreference"
                                    name="restorationDatePreference" id="restorationDatePreference" [min]="formValidationService.todaysDate"
                                    [max]="formValidationService.maxDate" />
                            </div>
                            <div>
                                <label class="asteriskrequired" for="provideDescriptions"
                                    customLabelAlert="Please Provide Descriptions">Provide Descriptions</label>
                                <input type="text" formControlName="provideDescriptions" name="provideDescriptions"
                                    id="provideDescriptions" />
                            </div>
                        </div>
                    </div>

                </div>

                <div class="mainBtnsDiv ms-3"
                    *ngIf="backUpForm.get('requestType')?.value && ((srId==undefined||srId==null)||this.srData?.status.trim() == 'Draft')">
                    <button class="actionBtn" (click)="Submit('Draft')">Draft</button>
                    <button class="actionBtn" (click)="Submit('Pending Approval')">Submit</button>
                    <button class="actionBtn" (click)="clearAll()">Clear</button>
                </div>

            </div>
        </div>
    </div>
</form>
